name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx vue-tsc --noEmit && npm run build

  backend-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm ci && npm run build
      - run: go vet ./...
        env:
          CGO_ENABLED: "1"
      - run: go test $(go list ./... | grep -v /tests) -count=1
        env:
          JWT_SECRET: test-secret
          ADMIN_PASSWORD: testadmin
          CGO_ENABLED: "1"
      - run: go build ./...
        env:
          CGO_ENABLED: "1"

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: asset_leasing
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm ci && npm run build
      - run: go test $(go list ./... | grep -v /tests) -count=1
        env:
          MODE: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: asset_leasing
          JWT_SECRET: test-secret
          ADMIN_PASSWORD: testadmin
          CGO_ENABLED: "1"
      - run: go build ./...
        env:
          CGO_ENABLED: "1"
