id: create-contract
version: 1
status: stable
since: 1.3.0

metadata:
  tags: [contract, core]
  owner: contract-team
  priority: P0

title: 创建合同
goal: 创建一份新的租赁合同，关联资产和租户

inputs:
  - { name: asset, domain: Asset }
  - { name: tenant, domain: Tenant }
  - { name: start_date, domain: Date }
  - { name: end_date, domain: Date }
  - { name: monthly_rent, domain: Money, min: 0 }
  - { name: deposit, domain: Money, min: 0, required: false }
  - { name: notes, domain: String, required: false }

outputs:
  - { name: contract, domain: Contract }

preconditions:
  - BR-003  # 资产处于可租赁状态
  - BR-004  # 租期内无重叠合同
  - BR-008  # 结束日期在开始日期之后

effects:
  sync:
    creates:
      - Contract
    updates: []
  async:
    emits:
      - ContractCreated

permissions:
  - contract:create

dependencies:
  requires:
    - ensure-contract-active
  triggers:
    - update-dashboard

observability:
  success:
    - "Contract 记录存在"
    - "状态为 active"
    - "关联正确的 Asset 和 Tenant"
  failure:
    - "资产在所选租期内已有合同"
    - "日期不合法（结束日早于开始日）"
